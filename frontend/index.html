<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>تحليل المشاعر العربية</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;700;900&display=swap" rel="stylesheet">

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Tajawal', Arial, sans-serif;
      background: radial-gradient(circle at top, #1a1a2e, #0a0a0f);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(14px);
      border-radius: 22px;
      padding: 40px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    }

    h1 {
      margin-bottom: 25px;
      font-size: 30px;
      font-weight: 900;
      text-align: center;
      background: linear-gradient(90deg, #8b5cf6, #06b6d4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    textarea {
      width: 100%;
      height: 150px;
      margin-top: 20px;
      padding: 15px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.2);
      background: rgba(0,0,0,0.35);
      color: white;
      font-size: 16px;
      outline: none;
      resize: none;
    }

    textarea:focus {
      border-color: #8b5cf6;
      box-shadow: 0 0 18px rgba(139,92,246,0.35);
    }

    button {
      margin-top: 20px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, #8b5cf6, #06b6d4);
      color: white;
      width: 100%;
      transition: 0.3s;
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.9;
    }

    /* RESULT BOX */
    #result {
      margin-top: 25px;
      font-size: 22px;
      font-weight: bold;
      padding: 18px;
      border-radius: 14px;
      text-align: center;
      min-height: 60px;
      border: 1px solid rgba(255,255,255,0.12);
      transition: 0.3s;
    }

    /* COLORS */
    .positive {
      background: rgba(34,197,94,0.15);
      color: #22c55e;
    }

    .negative {
      background: rgba(239,68,68,0.15);
      color: #ef4444;
    }

    .neutral {
      background: rgba(234,179,8,0.15);
      color: #eab308;
    }

    /* SPINNER */
    .spinner {
      display: none;
      margin: 15px auto 0;
      width: 30px;
      height: 30px;
      border: 4px solid rgba(255,255,255,0.2);
      border-top: 4px solid white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

  </style>
</head>

<body>

<div class="container">

  <h1>تحليل المشاعر العربية</h1>

  <textarea id="text" placeholder="اكتب النص هنا..."></textarea>

  <button onclick="predict()">تحليل</button>

  <div class="spinner" id="spinner"></div>

  <div id="result"></div>

</div>

<script>
const API_URL = "http://YOUR_EC2_PUBLIC_IP:5000/predict";

async function predict() {
  const text = document.getElementById("text").value;
  const resultBox = document.getElementById("result");
  const spinner = document.getElementById("spinner");

  resultBox.className = "";
  resultBox.innerText = "";

  spinner.style.display = "block";

  try {
    const res = await fetch(API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text })
    });

    const data = await res.json();

    spinner.style.display = "none";

    const pred = data.prediction.toLowerCase();

    let emoji = "😐";
    let cls = "neutral";

    if (pred.includes("pos")) {
      emoji = "😊";
      cls = "positive";
    } else if (pred.includes("neg")) {
      emoji = "😞";
      cls = "negative";
    }

    resultBox.className = cls;
    resultBox.innerText = `${emoji} Prediction: ${data.prediction}`;

  } catch (err) {
    spinner.style.display = "none";
    resultBox.className = "negative";
    resultBox.innerText = "❌ Error: " + err.message;
  }
}
</script>

</body>
</html>
